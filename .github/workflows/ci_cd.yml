name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/antenna_tracker_env
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        if: github.event_name == 'push'

      - name: Build Docker Image (Local/Cache)
        run: |
          docker build -t antenna_tracker_env docker/

      - name: Build ROS 2 Workspace (with coverage instrumentation)
        run: |
          docker run --rm -v ${{ github.workspace }}:/ros2_ws antenna_tracker_env bash -c "
            git config --global --add safe.directory /ros2_ws &&
            cd /ros2_ws && source /opt/ros/humble/setup.bash &&
            colcon build --cmake-args -DENABLE_COVERAGE=ON -DCMAKE_BUILD_TYPE=Debug"

      - name: Run ROS 2 Unit Tests
        run: |
          docker run --rm -v ${{ github.workspace }}:/ros2_ws antenna_tracker_env bash -c "
            git config --global --add safe.directory /ros2_ws &&
            cd /ros2_ws && source /opt/ros/humble/setup.bash && source install/setup.bash &&
            colcon test --packages-select antenna_tracker_controller &&
            colcon test-result --verbose"

      - name: Check Code Coverage (≥90%)
        run: |
          docker run --rm -v ${{ github.workspace }}:/ros2_ws antenna_tracker_env bash -c "
            set -e
            apt-get update -qq
            apt-get install -q -y lcov > /dev/null 2>&1

            cd /ros2_ws

            # Capture coverage data from instrumented build
            lcov --capture \
                 --directory build/antenna_tracker_controller \
                 --output-file /tmp/cov_raw.info \
                 --rc lcov_branch_coverage=0 \
                 --quiet 2>/dev/null || true

            # Remove: test files, ROS2/system headers, acados generated code
            lcov --remove /tmp/cov_raw.info \
                 '*/test/*' \
                 '*/rosidl_generator_cpp/*' \
                 '/opt/ros/*' \
                 '/usr/include/*' \
                 '/usr/local/*' \
                 '*/c_generated_code/*' \
                 '*/acados/*' \
                 '*/install/*' \
                 --output-file /tmp/cov.info \
                 --rc lcov_branch_coverage=0 \
                 --quiet 2>/dev/null || true

            echo '=== Coverage summary ==='
            lcov --summary /tmp/cov.info 2>&1 | tee /tmp/lcov_summary.txt || true

            # Extract line coverage percentage
            PCT=\$(grep 'lines' /tmp/lcov_summary.txt | grep -oP '[\d.]+(?=%)' | head -1)
            echo \"=== Line coverage: \${PCT}% ===\"

            # Enforce 90% threshold
            awk -v p=\"\${PCT}\" 'BEGIN {
              if (p == \"\") { print \"WARN: no coverage data (acados may be unavailable)\"; exit 0 }
              if (p+0 < 90.0) { printf \"FAIL: %.1f%% < 90%% threshold\n\", p+0; exit 1 }
              printf \"PASS: %.1f%% >= 90%% threshold\n\", p+0
            }'
          "

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            build/antenna_tracker_controller/**/*.gcda
            build/antenna_tracker_controller/**/*.gcno
          if-no-files-found: ignore

      - name: Setup vcan interface
        run: |
          sudo apt-get update -qq

          if ! ip link show vcan0 >/dev/null 2>&1; then
            sudo modprobe vcan || {
              sudo apt-get install -y linux-modules-extra-$(uname -r)
              sudo modprobe vcan
            }
            sudo ip link add dev vcan0 type vcan
          fi

          sudo ip link set up vcan0
          ip link show vcan0

      - name: Integration test — CAN bridge (vcan)
        run: |
          docker run --rm --privileged --network host \
            -v ${{ github.workspace }}:/ros2_ws \
            antenna_tracker_env bash -c "
              set -e
              source /opt/ros/humble/setup.bash
              source /ros2_ws/install/setup.bash

              # Start can_bridge_node on vcan0
              ros2 run antenna_tracker_hardware can_bridge_node \
                --ros-args -p can_interface:=vcan0 &
              BRIDGE_PID=\$!
              sleep 2

              # topic echo 리스너를 먼저 백그라운드로 시작 (subscribe 완료 후 CAN 전송)
              timeout 10 ros2 topic echo /antenna/encoder_feedback --once > /tmp/enc.txt &
              timeout 10 ros2 topic echo /imu/raw --once > /tmp/imu.txt &
              timeout 10 ros2 topic echo /magnetic_field --once > /tmp/mag.txt &
              sleep 2  # 리스너 subscribe 대기

              # CAN 프레임 반복 전송 (DDS discovery 지연 대비 — 1초 간격 × 8회)
              # IMU는 accel(0x200)+gyro(0x201) 두 프레임 모두 와야 발행됨
              for i in 1 2 3 4 5 6 7 8; do
                cansend vcan0 204#0B40038403
                cansend vcan0 200#03E8000000000000
                cansend vcan0 201#006400000000
                cansend vcan0 202#03E8000000000000
                sleep 1
              done

              # 결과 확인
              grep -q 'az_angle_deg' /tmp/enc.txt \
                && echo '[PASS] encoder_feedback' || (echo '[FAIL] encoder_feedback' && cat /tmp/enc.txt && exit 1)

              grep -q 'linear_acceleration' /tmp/imu.txt \
                && echo '[PASS] imu/raw' || (echo '[FAIL] imu/raw' && cat /tmp/imu.txt && exit 1)

              grep -q 'magnetic_field' /tmp/mag.txt \
                && echo '[PASS] magnetic_field' || (echo '[FAIL] magnetic_field' && cat /tmp/mag.txt && exit 1)

              kill \$BRIDGE_PID 2>/dev/null || true
              echo 'CAN bridge integration test PASSED'
            "

      - name: Integration test — sensor_fusion_node
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}:/ros2_ws \
            antenna_tracker_env bash -c "
              set -e
              source /opt/ros/humble/setup.bash
              source /ros2_ws/install/setup.bash

              # Start sensor_fusion_node
              ros2 run antenna_tracker_controller sensor_fusion_node &
              FUSION_PID=\$!
              sleep 2

              # Publish mock IMU (raw accel+gyro, identity orientation)
              ros2 topic pub --once /imu/raw sensor_msgs/msg/Imu \
                '{header: {frame_id: imu_link},
                  linear_acceleration: {x: 0.0, y: 0.0, z: 9.81},
                  angular_velocity: {x: 0.0, y: 0.0, z: 0.0},
                  orientation_covariance: [-1,0,0,0,0,0,0,0,0]}' &

              # Publish mock mag
              ros2 topic pub --once /magnetic_field sensor_msgs/msg/MagneticField \
                '{header: {frame_id: imu_link},
                  magnetic_field: {x: 0.00003, y: 0.0, z: 0.00004}}' &

              sleep 3

              # Verify imu_fusion published
              timeout 5 ros2 topic echo /antenna/imu_fusion --once | grep -q 'azimuth' \
                && echo '[PASS] imu_fusion' || (echo '[FAIL] imu_fusion' && exit 1)

              kill \$FUSION_PID 2>/dev/null || true
              echo 'sensor_fusion integration test PASSED'
            "

      - name: Integration test — balloon telemetry (0x100~0x10A)
        run: |
          docker run --rm --privileged --network host \
            -v ${{ github.workspace }}:/ros2_ws \
            antenna_tracker_env bash -c "
              set -e
              source /opt/ros/humble/setup.bash
              source /ros2_ws/install/setup.bash

              # Start can_bridge_node on vcan0
              ros2 run antenna_tracker_hardware can_bridge_node \
                --ros-args -p can_interface:=vcan0 &
              BRIDGE_PID=\$!
              sleep 2

              # /balloon/telemetry 리스너를 먼저 시작 (11 프레임 수신 후 발행)
              timeout 15 ros2 topic echo /balloon/telemetry --once > /tmp/balloon.txt &
              sleep 2  # subscribe 대기

              # 11개 CAN 프레임 전송 (0x100~0x10A, 8 bytes each)
              # 0x100: lat_e7=0, lon_e7=0
              cansend vcan0 100#0000000000000000
              # 0x101: kf_alt=0(int16), rssi=0(int16), fix=1, sats=8, h=12, m=0
              cansend vcan0 101#0000000001080C00
              # 0x102: sec=0,day=1,mon=3,sats_view=8, year=2026(EA07 LE), flags=0
              cansend vcan0 102#00010308EA070000
              # 0x103: accel_xyz=0(int16×100), gyro_x=0(int16×1000)
              cansend vcan0 103#0000000000000000
              # 0x104: gyro_yz=0, mag_xy=0(int16×10)
              cansend vcan0 104#0000000000000000
              # 0x105: mag_z=0, kf_roll=0, kf_pitch=0, press_alt=0
              cansend vcan0 105#0000000000000000
              # 0x106: board/ext/sht31 temp=0, sht31_rh=0
              cansend vcan0 106#0000000000000000
              # 0x107: ms5611_press=0(u32), ms5611_temp=0, co2=400ppm(9001 LE)
              cansend vcan0 107#0000000000009001
              # 0x108: pm1/pm25/pm10=0, ozone=0
              cansend vcan0 108#0000000000000000
              # 0x109: gdk101=0, bat_mv=3700(740E LE), bat_temp=0, heater=0
              cansend vcan0 109#0000740E00000000
              # 0x10A: seq=1(0100 LE), uptime=1000ms(E8030000 LE), pad=0000
              cansend vcan0 10A#0100E80300000000

              # 수신 대기
              sleep 10

              # 결과 확인
              grep -q 'latitude' /tmp/balloon.txt \
                && echo '[PASS] balloon/telemetry' \
                || (echo '[FAIL] balloon/telemetry' && cat /tmp/balloon.txt && exit 1)

              kill \$BRIDGE_PID 2>/dev/null || true
              echo 'Balloon telemetry integration test PASSED'
            "

      - name: End-to-end simulation test — Gazebo closed loop
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/ros2_ws \
            antenna_tracker_env bash -lc "
              set -e
              cd /ros2_ws
              bash /ros2_ws/scripts/test_sim_e2e.sh
            "

      - name: End-to-end simulation test — Gazebo AUTO closed loop
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/ros2_ws \
            antenna_tracker_env bash -lc "
              set -e
              cd /ros2_ws
              bash /ros2_ws/scripts/test_sim_auto_e2e.sh
            "

      - name: Simulation regression test — boundaries and soak
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/ros2_ws \
            antenna_tracker_env bash -lc "
              set -e
              cd /ros2_ws
              bash /ros2_ws/scripts/test_sim_regression.sh
            "

      - name: Push Docker image (CD)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker tag antenna_tracker_env ${IMAGE}:latest
          docker push ${IMAGE}:latest
