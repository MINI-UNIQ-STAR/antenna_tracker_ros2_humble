name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/antenna_tracker_env
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        if: github.event_name == 'push'

      - name: Build Docker Image (Local/Cache)
        run: |
          docker build -t antenna_tracker_env docker/

      - name: Build ROS 2 Workspace
        run: |
          docker run --rm -v ${{ github.workspace }}:/ros2_ws antenna_tracker_env bash -c "
            git config --global --add safe.directory /ros2_ws &&
            cd /ros2_ws && source /opt/ros/humble/setup.bash && colcon build"

      - name: Run ROS 2 Tests
        run: |
          docker run --rm -v ${{ github.workspace }}:/ros2_ws antenna_tracker_env bash -c "
            git config --global --add safe.directory /ros2_ws &&
            cd /ros2_ws && source /opt/ros/humble/setup.bash && source install/setup.bash && colcon test && colcon test-result"

      - name: Setup vcan interface
        run: |
          # GitHub Actions Azure 커널은 vcan 모듈이 기본 미포함
          # linux-modules-extra 패키지로 설치
          sudo apt-get update -qq
          sudo apt-get install -y linux-modules-extra-$(uname -r)
          sudo modprobe vcan
          sudo ip link add dev vcan0 type vcan
          sudo ip link set up vcan0
          ip link show vcan0

      - name: Integration test — CAN bridge (vcan)
        run: |
          docker run --rm --privileged --network host \
            -v ${{ github.workspace }}:/ros2_ws \
            antenna_tracker_env bash -c "
              set -e
              source /opt/ros/humble/setup.bash
              source /ros2_ws/install/setup.bash

              # Start can_bridge_node on vcan0
              ros2 run antenna_tracker_hardware can_bridge_node \
                --ros-args -p can_interface:=vcan0 &
              BRIDGE_PID=\$!
              sleep 2

              # topic echo 리스너를 먼저 백그라운드로 시작 (subscribe 완료 후 CAN 전송)
              timeout 10 ros2 topic echo /antenna/encoder_feedback --once > /tmp/enc.txt &
              timeout 10 ros2 topic echo /imu/raw --once > /tmp/imu.txt &
              timeout 10 ros2 topic echo /magnetic_field --once > /tmp/mag.txt &
              sleep 2  # 리스너 subscribe 대기

              # CAN 프레임 전송
              cansend vcan0 204#0B40038403
              cansend vcan0 200#03E8000000000000
              cansend vcan0 201#006400000000
              cansend vcan0 202#03E8000000000000

              # 리스너 수신 대기 (최대 8초)
              sleep 8

              # 결과 확인
              grep -q 'az_angle_deg' /tmp/enc.txt \
                && echo '[PASS] encoder_feedback' || (echo '[FAIL] encoder_feedback' && cat /tmp/enc.txt && exit 1)

              grep -q 'linear_acceleration' /tmp/imu.txt \
                && echo '[PASS] imu/raw' || (echo '[FAIL] imu/raw' && cat /tmp/imu.txt && exit 1)

              grep -q 'magnetic_field' /tmp/mag.txt \
                && echo '[PASS] magnetic_field' || (echo '[FAIL] magnetic_field' && cat /tmp/mag.txt && exit 1)

              kill \$BRIDGE_PID 2>/dev/null || true
              echo 'CAN bridge integration test PASSED'
            "

      - name: Integration test — sensor_fusion_node
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}:/ros2_ws \
            antenna_tracker_env bash -c "
              set -e
              source /opt/ros/humble/setup.bash
              source /ros2_ws/install/setup.bash

              # Start sensor_fusion_node
              ros2 run antenna_tracker_controller sensor_fusion_node &
              FUSION_PID=\$!
              sleep 2

              # Publish mock IMU (raw accel+gyro, identity orientation)
              ros2 topic pub --once /imu/raw sensor_msgs/msg/Imu \
                '{header: {frame_id: imu_link},
                  linear_acceleration: {x: 0.0, y: 0.0, z: 9.81},
                  angular_velocity: {x: 0.0, y: 0.0, z: 0.0},
                  orientation_covariance: [-1,0,0,0,0,0,0,0,0]}' &

              # Publish mock mag
              ros2 topic pub --once /magnetic_field sensor_msgs/msg/MagneticField \
                '{header: {frame_id: imu_link},
                  magnetic_field: {x: 0.00003, y: 0.0, z: 0.00004}}' &

              sleep 3

              # Verify imu_fusion published
              timeout 5 ros2 topic echo /antenna/imu_fusion --once | grep -q 'azimuth' \
                && echo '[PASS] imu_fusion' || (echo '[FAIL] imu_fusion' && exit 1)

              kill \$FUSION_PID 2>/dev/null || true
              echo 'sensor_fusion integration test PASSED'
            "

      - name: Push Docker image (CD)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker tag antenna_tracker_env ${IMAGE}:latest
          docker push ${IMAGE}:latest
