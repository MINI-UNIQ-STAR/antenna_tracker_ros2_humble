# Antenna Tracker Simulation Parameters
# NEMA23 1.8° stepper + 20:1 gearbox digital-twin defaults

/**:
  ros__parameters:
    # System
    loop_rate_hz: 100.0
    use_sim_time: true

    # Tracker Ground Station Position (하동 금오산 849m)
    default_ground_lat: 35.0650
    default_ground_lon: 127.7600
    default_ground_alt: 849.0

    # Sensor Fusion
    complementary_alpha: 0.98
    mag_declination_deg: -8.0
    kalman_q_process: 0.01
    kalman_r_measurement: 1.0

    # Controller tuning for simulation
    az_pos_kp: 10.0
    az_pos_ki: 0.05
    az_pos_kd: 0.2
    az_vel_kp: 3.0
    az_vel_ki: 0.02
    az_vel_kd: 0.05
    el_pos_kp: 6.0
    el_pos_ki: 0.5
    el_pos_kd: 0.15
    el_vel_kp: 3.0
    el_vel_ki: 0.1
    el_vel_kd: 0.05

    # Angle Limits
    azimuth_min_deg: 0.0
    azimuth_max_deg: 360.0
    elevation_min_deg: 0.0
    elevation_max_deg: 90.0

    # Stepper/Motor Configuration (NEMA23 1.8° + 20:1 gearbox)
    stepper_pulses_per_rev: 200.0
    stepper_microsteps: 1.0
    gear_ratio: 20.0
    mpc_to_hz_scale: 6.37

    # Simulation-specific (NEMA23 1.2Nm + 20:1 + 야기 500g@0.9m)
    motor_max_speed_dps: 180.0
    motor_max_accel_dps2: 1800.0        # 물리적 안전 한계 (안전계수 0.8 적용)
    command_deadzone_hz: 18.0
    disturbance_dps2: 0.25
    command_noise_hz: 0.0
    encoder_noise_deg: 0.0
    velocity_noise_dps: 0.0
    gravity_coeff_rads2: 10.77          # 4.42 Nm / 0.41 kg·m² (실측 기반)
    az_damping: 10.0
    # 실측 하드웨어 물리 파라미터
    load_mass_kg: 0.5
    arm_length_m: 0.9
    load_inertia_kgm2: 0.41
    motor_holding_torque_nm: 1.2
    gearbox_efficiency: 0.85
    # Backlash (기어 백래시)
    az_backlash_deg: 0.8
    el_backlash_deg: 0.5
    # Step Loss (스텝 탈조)
    step_loss_accel_threshold_dps2: 2232.0
    step_loss_rate: 0.002

    # Timeouts (relaxed for simulation)
    imu_timeout_sec: 5.0
    lora_timeout_sec: 30.0
    diagnostics_rate_hz: 1.0
