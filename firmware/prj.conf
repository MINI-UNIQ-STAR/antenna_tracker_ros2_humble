# CAN Bus Transport (replaces micro-ROS USB CDC)
# FDCAN in Classic CAN 2.0B mode — ESP32 TWAI and MCP2515 do not support CAN FD
CONFIG_CAN=y
CONFIG_CAN_FD_MODE=n

# Core
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_MAIN_THREAD_PRIORITY=3

# Logging
CONFIG_STDOUT_CONSOLE=y
CONFIG_LOG=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Peripherals
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_I2C=y
CONFIG_GPIO=y
