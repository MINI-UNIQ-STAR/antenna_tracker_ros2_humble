# CAN (ESP32 TWAI — Classic CAN 2.0B, 500kbps)
CONFIG_CAN=y
CONFIG_CAN_FD_MODE=n

# LoRa (SX1276)
CONFIG_LORA=y
CONFIG_LORA_SX127X=y

# SPI (LoRa SX1276 interface)
CONFIG_SPI=y

# GPIO
CONFIG_GPIO=y

# Core
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_MAIN_THREAD_PRIORITY=3

# Logging
CONFIG_STDOUT_CONSOLE=y
CONFIG_LOG=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
